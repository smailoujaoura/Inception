services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    ports:
      - "3306:3306"
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MYSQL_USER
      - MYSQL_PASSWORD
    restart: always

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    volumes:
      - wordpress:/var/www/html
    env_file:
      - .env
    environment:
      - DOMAIN_NAME
      - MYSQL_ROOT_PASSWORD
      - MYSQL_USER
      - MYSQL_PASSWORD
      - MYSQL_DATABASE
      - WP_ADMIN_USER
      - WP_ADMIN_PASSWORD
      - WP_USER
      - WP_USER_PASSWORD
      - REDIS_HOST=redis
    depends_on:
      - mariadb
      - redis
    networks:
      - inception
    restart: always
    expose: ["9000"]

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - wordpress
    networks:
      - inception
    restart: always

  static:
    build: ./requirements/bonus/static
    container_name: static
    ports:
      - "8080:80"
    networks:
      - inception
    restart: always

  redis:
    build: ./requirements/bonus/redis
    container_name: redis
    networks:
      - inception
    ports:
      - "6379:6379"
    restart: always  

networks:
  inception:
    driver: bridge

volumes:
  mariadb:
    driver: local
    driver_opts:
      type: none
      device: /home/soujaour/data/db
      o: bind
  wordpress:
    driver: local
    driver_opts:
      type: none
      device: /home/soujaour/data/wp
      o: bind